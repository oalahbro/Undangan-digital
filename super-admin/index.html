<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    [hidden]{display:none!important}
    .badge-dom{font-size:.7em;vertical-align:middle;margin:1px 2px}
  </style>
</head>
<body class="bg-light">

<!-- LOGIN -->
<div id="loginWrap" class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-sm p-4" style="width:300px">
    <h6 class="text-center fw-bold mb-3">Panel Admin</h6>
    <div id="loginErr" class="alert alert-danger py-1 small mb-2" hidden></div>
    <form id="loginForm">
      <input type="password" id="loginPass" class="form-control mb-3" placeholder="Password"
             autocomplete="current-password" required>
      <button class="btn btn-primary w-100" type="submit">Masuk</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" hidden>
  <nav class="navbar navbar-dark bg-dark px-3 mb-4">
    <span class="navbar-brand fw-bold">Panel Admin</span>
    <button id="btnLogout" class="btn btn-outline-light btn-sm">Keluar</button>
  </nav>
  <div class="container-lg">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">
        Daftar Client
        <span id="countBadge" class="badge bg-secondary ms-1 small"></span>
      </h5>
      <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#mAdd">
        + Tambah Client
      </button>
    </div>
    <div id="dashErr" class="alert alert-danger py-1 small" hidden></div>
    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Slug</th><th>Nama</th><th>Template</th><th>Domain</th><th>Dibuat</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="text-center text-muted py-3 small">Memuat…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Tambah Client -->
<div class="modal fade" id="mAdd" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title">Tambah Client</h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="addErr" class="alert alert-danger py-1 small" hidden></div>
        <label class="form-label small fw-semibold mb-1">
          Slug <span class="text-muted fw-normal">(huruf kecil, angka, strip)</span>
        </label>
        <input id="addSlug" class="form-control form-control-sm mb-2" placeholder="mis. eka-salsa">
        <label class="form-label small fw-semibold mb-1">Nama Client</label>
        <input id="addName" class="form-control form-control-sm mb-2" placeholder="mis. Eka &amp; Salsa">
        <label class="form-label small fw-semibold mb-1">Template</label>
        <select id="addTemplate" class="form-select form-select-sm mb-2">
          <option value="green-pii">green-pii</option>
        </select>
        <label class="form-label small fw-semibold mb-1">
          Password <span class="text-muted fw-normal">(kosong = generate otomatis)</span>
        </label>
        <input id="addPasswd" class="form-control form-control-sm" placeholder="opsional">
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
        <button id="btnAddSave" class="btn btn-success btn-sm">Buat</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Hasil (new client / reset pw) — tampil sekali, password harus dicatat -->
<div class="modal fade" id="mResult" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 id="mResultTitle" class="modal-title"></h6>
      </div>
      <div class="modal-body">
        <div class="alert alert-warning py-2 small mb-3">
          Simpan password ini — tidak bisa ditampilkan lagi.
        </div>
        <table class="table table-sm table-bordered mb-0" id="mResultTable"></table>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-primary btn-sm" data-bs-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Reset Password -->
<div class="modal fade" id="mPasswd" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title">Reset Password — <span id="mPasswdSlug"></span></h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="passwdErr" class="alert alert-danger py-1 small" hidden></div>
        <input id="passwdNew" class="form-control form-control-sm"
               placeholder="Password baru (kosong = generate otomatis)">
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
        <button id="btnPasswdSave" class="btn btn-primary btn-sm">Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Tambah Domain -->
<div class="modal fade" id="mDomain" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title">Tambah Domain — <span id="mDomainSlug"></span></h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="domainErr" class="alert alert-danger py-1 small" hidden></div>
        <input id="domainNew" class="form-control form-control-sm" placeholder="mis. undangan-eka.com">
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
        <button id="btnDomainSave" class="btn btn-primary btn-sm">Tambah</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Hapus Client -->
<div class="modal fade" id="mDelete" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title text-danger">Hapus Client</h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small">
        <div id="deleteErr" class="alert alert-danger py-1 small" hidden></div>
        <p class="mb-1">Hapus client <strong id="mDeleteSlug"></strong> dari registry?</p>
        <p class="text-muted mb-0">File data &amp; upload <em>tidak</em> ikut terhapus.</p>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
        <button id="btnDeleteConfirm" class="btn btn-danger btn-sm">Hapus</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const BASE = window.location.pathname.replace(/\/+$/, '');
  const j = (p, o) => fetch(BASE + p, { headers: { 'Content-Type': 'application/json' }, ...o });
  const err = (id, msg) => { const e = document.getElementById(id); e.textContent = msg || ''; e.hidden = !msg; };
  const esc = s => String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  let active = null;
  const M = {};
  ['mAdd', 'mResult', 'mPasswd', 'mDomain', 'mDelete'].forEach(id => {
    M[id] = new bootstrap.Modal(document.getElementById(id));
  });

  async function loadTemplates() {
    try {
      const r = await j('/api/templates');
      if (!r.ok) return;
      const list = await r.json();
      const sel = document.getElementById('addTemplate');
      sel.innerHTML = list.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
    } catch {}
  }

  async function load() {
    err('dashErr', '');
    const r = await j('/api/tenants');
    if (!r.ok) { err('dashErr', (await r.json()).error || 'Gagal memuat data'); return; }
    const list = await r.json();
    document.getElementById('countBadge').textContent = list.length;
    const tbody = document.getElementById('tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3 small">Belum ada client.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(t => `
      <tr>
        <td><code class="small">${esc(t.slug)}</code></td>
        <td class="small">${esc(t.name)}</td>
        <td><span class="badge bg-info text-dark small">${esc(t.template||'green-pii')}</span></td>
        <td class="small">${(t.domains || []).map(d => `<span class="badge bg-secondary badge-dom">${esc(d)}</span>`).join('') || '<span class="text-muted">—</span>'}</td>
        <td class="small text-muted">${t.createdAt ? new Date(t.createdAt).toLocaleDateString('id-ID') : '—'}</td>
        <td class="text-nowrap">
          <button class="btn btn-outline-primary btn-sm me-1" onclick="openPasswd('${esc(t.slug)}')">Reset PW</button>
          <button class="btn btn-outline-secondary btn-sm me-1" onclick="openDomain('${esc(t.slug)}')">+ Domain</button>
          <button class="btn btn-outline-danger btn-sm" onclick="openDelete('${esc(t.slug)}')">Hapus</button>
        </td>
      </tr>`).join('');
  }

  function showResult(title, rows) {
    document.getElementById('mResultTitle').textContent = title;
    document.getElementById('mResultTable').innerHTML = rows
      .map(([k, v]) => `<tr><th class="small w-25 text-muted fw-normal">${esc(k)}</th><td><code class="text-danger fw-bold">${esc(v)}</code></td></tr>`)
      .join('');
    M.mResult.show();
  }

  // Login
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    err('loginErr', '');
    const r = await j('/login', {
      method: 'POST',
      body: JSON.stringify({ password: document.getElementById('loginPass').value })
    });
    if (!r.ok) { err('loginErr', (await r.json()).error || 'Password salah'); return; }
    document.getElementById('loginWrap').hidden = true;
    document.getElementById('dashboard').hidden = false;
    loadTemplates();
    load();
  });

  // Logout
  document.getElementById('btnLogout').addEventListener('click', async () => {
    await j('/logout', { method: 'POST' });
    location.reload();
  });

  // Tambah Client
  document.getElementById('btnAddSave').addEventListener('click', async () => {
    err('addErr', '');
    const body = {
      slug:     document.getElementById('addSlug').value.trim(),
      name:     document.getElementById('addName').value.trim(),
      template: document.getElementById('addTemplate').value
    };
    const pw = document.getElementById('addPasswd').value.trim();
    if (pw) body.password = pw;
    const r = await j('/api/tenants', { method: 'POST', body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) { err('addErr', d.error || 'Gagal'); return; }
    M.mAdd.hide();
    ['addSlug', 'addName', 'addPasswd'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('addTemplate').selectedIndex = 0;
    showResult('Client Dibuat', [['Slug', d.slug], ['Nama', d.name], ['Password', d.password]]);
    load();
  });

  // Reset Password
  function openPasswd(slug) {
    active = slug;
    document.getElementById('mPasswdSlug').textContent = slug;
    document.getElementById('passwdNew').value = '';
    err('passwdErr', '');
    M.mPasswd.show();
  }
  document.getElementById('btnPasswdSave').addEventListener('click', async () => {
    err('passwdErr', '');
    const body = {};
    const pw = document.getElementById('passwdNew').value.trim();
    if (pw) body.password = pw;
    const r = await j(`/api/tenants/${active}/password`, { method: 'PATCH', body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) { err('passwdErr', d.error || 'Gagal'); return; }
    M.mPasswd.hide();
    showResult('Password Direset', [['Slug', d.slug], ['Password Baru', d.password]]);
  });

  // Tambah Domain
  function openDomain(slug) {
    active = slug;
    document.getElementById('mDomainSlug').textContent = slug;
    document.getElementById('domainNew').value = '';
    err('domainErr', '');
    M.mDomain.show();
  }
  document.getElementById('btnDomainSave').addEventListener('click', async () => {
    err('domainErr', '');
    const r = await j(`/api/tenants/${active}/domain`, {
      method: 'POST',
      body: JSON.stringify({ domain: document.getElementById('domainNew').value.trim() })
    });
    const d = await r.json();
    if (!r.ok) { err('domainErr', d.error || 'Gagal'); return; }
    M.mDomain.hide();
    load();
  });

  // Hapus Client
  function openDelete(slug) {
    active = slug;
    document.getElementById('mDeleteSlug').textContent = slug;
    err('deleteErr', '');
    M.mDelete.show();
  }
  document.getElementById('btnDeleteConfirm').addEventListener('click', async () => {
    err('deleteErr', '');
    const r = await j(`/api/tenants/${active}`, { method: 'DELETE' });
    if (!r.ok) { err('deleteErr', (await r.json()).error || 'Gagal'); return; }
    M.mDelete.hide();
    load();
  });

  // Cek session saat load halaman
  j('/api/me').then(async r => {
    if (r.ok && (await r.json()).ok) {
      document.getElementById('loginWrap').hidden = true;
      document.getElementById('dashboard').hidden = false;
      loadTemplates();
      load();
    }
  }).catch(() => {});
</script>
</body>
</html>
